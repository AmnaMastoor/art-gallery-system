<!DOCTYPE html>
<html>
<head>
    <title>Insert Artist</title>
    <meta name="viewport" content="width=device-width, initial-scale=1">
    <style>
        body {
            font-family: Arial, Helvetica, sans-serif;
            background-color: #f4f4f4;
        }

        .container {
            max-width: 700px;
            margin: 40px auto;
            padding: 20px 30px;
            background-color: white;
            border-radius: 12px;
            box-shadow: 0 0 12px rgba(0,0,0,0.1);
        }

        h1 {
            text-align: center;
            color: #3366cc;
            margin-bottom: 30px;
        }

        label {
            font-weight: bold;
            display: block;
            margin-top: 15px;
        }

        input[type="text"], input[type="number"] {
            width: 100%;
            padding: 12px;
            margin-top: 5px;
            border-radius: 6px;
            border: 1.5px solid grey;
            font-size: 16px;
            background: #f9f9f9;
        }

        .btn-group {
            text-align: center;
            margin-top: 30px;
        }

        .registerbtn, .registerbtn1 {
            background-color: forestgreen;
            color: white;
            padding: 12px 24px;
            margin: 8px;
            border: none;
            border-radius: 20px;
            font-weight: bold;
            cursor: pointer;
            width: 40%;
            font-size: 16px;
            box-shadow: 0 4px #2e8b57;
            transition: all 0.2s ease;
        }

        .registerbtn1 {
            background-color: crimson;
            box-shadow: 0 4px #a30000;
        }

        .registerbtn:hover,
        .registerbtn1:hover {
            opacity: 0.9;
        }
    </style>
</head>
<body>

<form action="artistinsert.php" method="POST">
    <div class="container">
        <h1>Insert Artist Details</h1>

        <label for="artistid">Artist ID</label>
        <input type="text" name="artistid" placeholder="e.g. A101" required>

        <label for="fname">First Name</label>
        <input type="text" name="fname" placeholder="First Name" required>

        <label for="lname">Last Name</label>
        <input type="text" name="lname" placeholder="Last Name" required>

        <label for="birthplace">Birthplace</label>
        <input type="text" name="birthplace" placeholder="e.g. Lahore" required>

        <label for="style_id">Art Style ID</label>
        <input type="number" name="style_id" placeholder="Enter Style ID (numeric)" required>

        <div class="btn-group">
            <button type="submit" class="registerbtn">Submit</button>
            <button type="reset" class="registerbtn1">Reset</button>
        </div>
    </div>
</form>

</body>
</html>
