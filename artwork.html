  <style>
    body {
      margin: 0;
      padding: 0;
      font-family: 'Verdana', sans-serif;
      background: url("./Images/artwork.jpg") no-repeat;
      background-size: cover;
      background-attachment: fixed;
      color: wheat;
    }

    .title {
      text-align: center;
      font-family: 'Carter One', cursive;
      font-size: 32px;
      color: #FF0080;
      border: 8px groove floralwhite;
      border-radius: 6px;
      padding: 12px 20px;
      background-color: rgba(0, 0, 0, 0.5);
      margin: 20px auto;
      width: fit-content;
    }

    .options-heading {
      font-family: 'Carter One', cursive;
      font-size: 18px;
      margin: 30px 40px 10px;
      padding: 10px;
      background-color: rgba(0, 0, 0, 0.5);
      border-radius: 6px;
      display: inline-block;
    }

    .menu {
      margin: 20px 40px;
      max-width: 450px;
    }

    .menu ul {
      list-style: none;
      padding: 0;
    }

    .menu ul li {
      background-color: mediumslateblue;
      border-radius: 6px;
      margin-bottom: 12px;
      text-align: center;
      opacity: 0.85;
      transition: background-color 0.3s ease;
    }

    .menu ul li a {
      display: block;
      padding: 14px;
      font-size: 18px;
      font-family: 'Jockey One', sans-serif;
      font-weight: bold;
      color: white;
      text-decoration: none;
    }

    .menu ul li a:hover {
      background-color: white;
      color: black;
    }

    .back-link {
      margin: 40px;
    }

    .back-link a {
      font-size: 16px;
      color: gold;
      text-decoration: none;
    }

    .back-link a:hover {
      color: white;
      text-decoration: underline;
    }

    @media (max-width: 480px) {
      .title {
        font-size: 24px;
        padding: 8px 12px;
      }

      .options-heading {
        font-size: 16px;
        margin-left: 20px;
      }

      .menu {
        margin: 20px;
      }

      .menu ul li a {
        font-size: 16px;
        padding: 12px;
      }

      .back-link {
        margin-left: 20px;
      }

      .back-link a {
        font-size: 14px;
      }
    }
  </style>
