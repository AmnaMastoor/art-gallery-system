<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <title>Contacts</title>
  <link href="https://fonts.googleapis.com/css?family=Coiny|Candal|Jockey+One|Carter+One" rel="stylesheet">
  <style>
    body {
      background: url("https://images.pexels.com/photos/699122/pexels-photo-699122.jpeg?auto=compress&cs=tinysrgb&dpr=2&h=750&w=1260") no-repeat center center fixed;
      background-size: cover;
      font-family: Verdana, sans-serif;
      color: #2ecc71;
      margin: 0;
      padding: 0;
    }

    h1.title {
      font-size: 42px;
      font-family: 'Candal', cursive;
      border: 6px dashed #fff;
      padding: 15px 30px;
      color: #fff;
      text-align: center;
      margin: 40px auto 20px;
      width: fit-content;
      background-color: rgba(0, 0, 0, 0.6);
      border-radius: 15px;
      text-shadow: 2px 2px #000;
    }

    b.options-text {
      font-family: 'Carter One', cursive;
      font-size: 22px;
      color: #fff;
      display: block;
      text-align: center;
      margin: 10px auto 30px;
      background-color: rgba(0, 0, 0, 0.6);
      width: fit-content;
      padding: 10px 25px;
      border-radius: 10px;
      box-shadow: 2px 2px 10px rgba(0,0,0,0.5);
    }

    ul {
      list-style: none;
      padding: 0;
      margin: 0 auto 40px;
      max-width: 500px;
    }

    ul li {
      background-color: rgba(123, 104, 238, 0.9);
      margin-bottom: 20px;
      border-radius: 12px;
      transition: transform 0.2s, background-color 0.3s;
    }

    ul li:hover {
      transform: scale(1.03);
      background-color: rgba(106, 90, 205, 0.95);
    }

    ul li a {
      display: block;
      font-family: 'Jockey One', sans-serif;
      font-size: 22px;
      color: white;
      text-decoration: none;
      padding: 20px;
      text-align: center;
    }

    ul li a:hover {
      background-color: #fff;
      color: #000;
      border-radius: 0 0 12px 12px;
    }

    p.back-link {
      text-align: center;
      margin-bottom: 30px;
    }

    p.back-link a {
      font-family: Arial, sans-serif;
      font-weight: bold;
      color: #27ae60;
      font-size: 18px;
      text-decoration: none;
      background-color: #ecf0f1;
      padding: 10px 20px;
      border-radius: 8px;
      transition: background-color 0.3s, color 0.3s;
    }

    p.back-link a:hover {
      background-color: #2ecc71;
      color: white;
    }

    @media (max-width: 600px) {
      h1.title, b.options-text {
        font-size: 24px;
        margin: 20px auto;
      }
      ul li a {
        font-size: 18px;
        padding: 15px;
      }
    }
  </style>
</head>
<body>

  <h1 class="title">CONTACTS</h1>

  <b class="options-text">Select an option below:</b>

  <ul>
    <li><a href="coninsert.html">Insert Contact</a></li>
    <li><a href="condisplay.php">View All Contacts</a></li>
    <li><a href="consearch.php">Search Contacts</a></li>
    <li><a href="condelete.php">Delete Contact</a></li>
  </ul>

  <p class="back-link"><a href="FrontEnd.html">← Go Back</a></p>

</body>
</html>
