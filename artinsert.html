<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <title>Insert into Artwork</title>
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <style>
        body {
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
            background-color: #f9f9f9;
            margin: 0;
            padding: 0;
        }

        h1 {
            text-align: center;
            color: #3366cc;
            padding: 20px;
            border-bottom: 2px solid #ccc;
        }

        .container {
            max-width: 600px;
            margin: 30px auto;
            background-color: #fff;
            padding: 25px;
            border-radius: 12px;
            box-shadow: 0 0 10px rgba(0,0,0,0.1);
        }

        label {
            font-weight: bold;
            display: block;
            margin-bottom: 6px;
            font-size: 16px;
        }

        input[type="text"],
        input[type="number"],
        input[type="date"] {
            width: 100%;
            padding: 12px;
            margin-bottom: 20px;
            border: 1px solid #ccc;
            border-radius: 8px;
            font-size: 15px;
        }

        input:focus {
            border-color: #3366cc;
            outline: none;
            background-color: #eef6ff;
        }

        .button-group {
            display: flex;
            justify-content: space-between;
            margin-top: 10px;
        }

        .registerbtn,
        .registerbtn1 {
            width: 48%;
            padding: 12px;
            font-size: 16px;
            font-weight: bold;
            border: none;
            border-radius: 24px;
            cursor: pointer;
            transition: 0.3s ease;
        }

        .registerbtn {
            background-color: forestgreen;
            color: white;
        }

        .registerbtn:hover {
            background-color: green;
        }

        .registerbtn1 {
            background-color: red;
            color: white;
        }

        .registerbtn1:hover {
            background-color: darkred;
        }
    </style>
</head>
<body>

<h1>Fill the Form with Proper Details</h1>

<div class="container">
    <form action="artinsert.php" method="POST">
        <label for="E_ID">Exhibition ID</label>
        <input type="text" id="E_ID" name="E_ID" placeholder="e.g., EXH123" required>

        <label for="G_ID">Gallery ID</label>
        <input type="text" id="G_ID" name="G_ID" placeholder="e.g., GAL456" required>

        <label for="artid">Artwork ID</label>
        <input type="text" id="artid" name="artid" placeholder="e.g., ART789" required>

        <label for="artistid">Artist ID</label>
        <input type="text" id="artistid" name="artistid" placeholder="e.g., ARTIST001" required>

        <label for="title">Title of Artwork</label>
        <input type="text" id="title" name="title" placeholder="e.g., Starry Night" required>

        <label for="type_of_art">Type of Art</label>
        <input type="text" id="type_of_art" name="type_of_art" placeholder="e.g., Oil Painting" required>

        <label for="year">Published Year</label>
        <input type="number" id="year" name="year" placeholder="e.g., 2020" min="1000" max="2099" required>

        <label for="price">Price of Art (USD)</label>
        <input type="number" id="price" name="price" placeholder="e.g., 1500" min="0" required>

        <div class="button-group">
            <button type="submit" class="registerbtn">Submit</button>
            <button type="reset" class="registerbtn1">Reset</button>
        </div>
    </form>
</div>

</body>
</html>
