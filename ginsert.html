<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1" />
  <title>Insert Gallery Details</title>
  <style>
    /* Reset and base */
    * {
      box-sizing: border-box;
    }
    body {
      font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
      background-color: #f9fafb;
      margin: 0;
      padding: 0;
      display: flex;
      justify-content: center;
      align-items: center;
      min-height: 100vh;
    }

    form {
      background: #ffffff;
      padding: 30px 40px;
      border-radius: 16px;
      box-shadow: 0 8px 20px rgba(0, 0, 0, 0.1);
      width: 100%;
      max-width: 480px;
    }

    h1 {
      color: #3366cc;
      text-align: center;
      font-weight: 700;
      margin-bottom: 30px;
      border: 4px solid #ccc;
      padding: 15px 20px;
      border-radius: 12px;
      background-color: #f1f5ff;
      letter-spacing: 1.2px;
    }

    label {
      display: block;
      font-weight: 600;
      margin-bottom: 8px;
      font-size: 18px;
      color: #333;
    }

    input[type="text"] {
      width: 100%;
      padding: 14px 18px;
      margin-bottom: 25px;
      border-radius: 10px;
      border: 2px solid #ddd;
      font-size: 16px;
      font-weight: 600;
      background-color: #f9f9f9;
      transition: border-color 0.3s ease, background-color 0.3s ease;
    }
    input[type="text"]:focus {
      border-color: #3366cc;
      background-color: #ffffff;
      outline: none;
      box-shadow: 0 0 8px rgba(51, 102, 204, 0.3);
    }

    .button-group {
      display: flex;
      justify-content: space-between;
      gap: 20px;
    }

    button {
      flex: 1;
      padding: 15px 0;
      border: none;
      border-radius: 30px;
      font-weight: 700;
      font-family: 'Verdana', sans-serif;
      font-size: 17px;
      cursor: pointer;
      transition: background-color 0.3s ease, box-shadow 0.2s ease;
      box-shadow: 0 6px 0 rgba(0,0,0,0.12);
    }

    .registerbtn {
      background-color: #228B22; /* forestgreen */
      color: white;
      box-shadow: 0 6px 0 #196619;
    }
    .registerbtn:hover {
      background-color: #1e7c1e;
      box-shadow: 0 4px 0 #154d15;
    }

    .registerbtn1 {
      background-color: #d9534f; /* bootstrap red */
      color: white;
      box-shadow: 0 6px 0 #b03534;
    }
    .registerbtn1:hover {
      background-color: #c9302c;
      box-shadow: 0 4px 0 #7e211e;
    }

    @media (max-width: 480px) {
      form {
        padding: 20px;
      }
      h1 {
        font-size: 1.6rem;
        padding: 10px 15px;
      }
      button {
        font-size: 15px;
      }
    }
  </style>
</head>
<body>

  <form action="ginsert.php" method="POST" novalidate>
    <h1>Fill the Form with Proper Details</h1>

    <label for="G_ID">Gallery ID</label>
    <input type="text" id="G_ID" name="G_ID" placeholder="Enter Gallery ID" required />

    <label for="GNAME">Gallery Name</label>
    <input type="text" id="GNAME" name="GNAME" placeholder="Enter Gallery Name" required />

    <label for="LOCATION">Gallery Location</label>
    <input type="text" id="LOCATION" name="LOCATION" placeholder="Enter Gallery Location" required />

    <div class="button-group">
      <button type="submit" class="registerbtn">Submit</button>
      <button type="reset" class="registerbtn1">Reset</button>
    </div>
  </form>

</body>
</html>
